id: Q-008
stage: 1
category: basic
term: 債券
type: mcq
difficulty: 1
prereqs: []
prompt: |
  債券 (bond) とは何か、株式との主要な違いを 2 点挙げて説明してください。米国債 (US Treasury) が「安全資産」とされる理由にも触れてください。
rubric:
  - 会社や政府が発行する「借金の証書」
  - 定期的な利息 (クーポン) + 満期での元本返済
  - "株との違い: (a) 元本保証 (発行体が倒産しなければ), (b) リターン上限がある (クーポン固定)"
  - 米国債が安全資産: 米政府がドル発行主体で理論上デフォルトリスク極小
choices:
  A: "会社の所有権の一部で、配当を受け取れる。株式より安全だが売買はできない"
  B: "借金の証書で、クーポン（利息）と元本返済がある。株式との違いは元本保証とリターン上限。米国債はデフォルトリスク極小で安全資産"
  C: "政府が発行する通貨の一種で、インフレに連動して価値が変動する"
  D: "借金の証書で利息がつくが、満期前に売却すると必ず損失が出る"
correct: B
explanation: |
  **債券 (bond) = 発行体 (会社 or 政府) が資金調達のために発行する「借金の証書」**。買う側は「お金を貸す」立場で、見返りに以下を得る:

  1. **クーポン (coupon)**: 定期的な利息（例: 年 2 回、元本の X%）
  2. **元本返済**: 満期日に額面金額が戻ってくる（発行体が倒産しなければ）

  **株式との違い**:

  | 項目 | 株式 | 債券 |
  |------|-----|------|
  | 発行体 | 会社のみ | 政府 / 会社 / 自治体 |
  | 保有者の立場 | 所有者 | 債権者（貸し主） |
  | 元本 | 保証なし | 保証あり (発行体健全なら) |
  | リターン上限 | なし (株価無限大理論可) | ある (クーポン固定) |
  | 倒産時 | 残余財産から最後 | 株主より先に返される |

  **米国債 = safe haven (安全資産)**:
  - 発行体は米国政府
  - 米国政府はドルの発行主体 → 理論上 USD denominated で支払い不能にならない
  - 世界最大の債券市場 = 流動性極高
  - 「景気後退期に値上がりする」パターン（金利下落 → 債券価格上昇）

  **HY spread**（私のレポートで出てくる）= 「High Yield (低格付け社債) と US Treasury の利回り差」。スプレッドが拡大 = 信用不安、縮小 = 安心感。

  **イールドカーブ**（用語 11）も米国債の 10Y 利回り - 2Y 利回り をベース指標にする。債券の基礎なしにはマクロ指標の半分が読めない。
