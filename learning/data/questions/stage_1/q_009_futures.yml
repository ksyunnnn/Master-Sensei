id: Q-009
stage: 1
category: basic
term: 先物
type: mcq
difficulty: 2
prereqs: []
prompt: |
  先物 (futures) 取引の最小定義を書いてください。「Brent $94.40」という表記は何の価格を指していますか。
rubric:
  - 将来の特定の日に、今決めた価格で売買する約束（契約）
  - 取引所で売買される契約
  - Brent $94.40 は Brent 原油先物の価格（現物の樽ではなく契約）
  - 取引所で値付けされるため原油市況を反映
choices:
  A: "将来の株価を予測した数値。「Brent $94.40」は原油の将来予想価格"
  B: "現在の市場価格そのもの。「Brent $94.40」は原油の現物取引価格"
  C: "過去の平均価格を基に算出した指標。「Brent $94.40」は過去1年の平均原油価格"
  D: "将来の特定日に今決めた価格で売買する取引所上場の契約。「Brent $94.40」は原油先物契約の価格で現物価格ではない"
correct: D
explanation: |
  **先物 (futures) = 将来の特定日に、今日決めた価格で売買する約束（取引所上場の契約）**

  例: 「3 ヶ月後の 12/15 に、原油 1 樽を $80 で買う」という契約を今日結ぶ。12/15 に原油相場が $90 でも契約通り $80 で買える（$10 得）。$70 なら $80 で買うしかない（$10 損）。

  **契約自体が取引所で売買される**ので、市況が動くと契約の価値も動く。これが「先物価格」の正体。

  **「Brent $94.40」の正体**:
  - Brent = 北海産原油の銘柄（北海油田の代表原油）
  - $94.40 = Brent 原油**先物**の価格
  - 現物の樽を $94.40 で買える、という意味ではない
  - 最も活発な限月 (満期が最も近い先物) の価格を通常指す

  **先物を知らないと読めない用語**:
  - **VIX** = S&P 500 オプションから算出される指数、オプションは先物と同じ「派生商品」
  - **VIX term structure** = VIX 先物の異なる満期を並べたカーブ形状
  - **コンタンゴ / バックワーデーション** = 先物カーブの形状（期近 vs 期先）
  - **FOMC の金利期待** = Fed funds futures から逆算
  - **CME** (Chicago Mercantile Exchange) = 先物の代表取引所

  **なぜレバ ETF が先物 / スワップを使うか**:
  - SOXL が SOX 指数の 3x 日次リターンを再現するために、現物株より効率的
  - 先物は証拠金取引 = 少額で大きな exposure が取れる (internal leverage)
