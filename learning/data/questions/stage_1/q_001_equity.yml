id: Q-001
stage: 1
category: basic
term: 株式
type: mcq
difficulty: 1
prereqs: []
prompt: |
  株式 (equity, stock) とは何か。発行主体は誰で、保有者は何を得られるかを含めて、自分の言葉で 2 文程度で説明してください。
rubric:
  - 会社が発行する
  - 所有権（持ち分）の一部
  - 配当 / 株主総会の議決権 などのリターン権利
  - 元本保証なし、価格変動リスクあり
choices:
  A: "政府が発行する借用証書で、利息と元本返済が保証されている"
  B: "会社が資金調達のために発行する所有権の一部で、配当や議決権を得られるが元本保証はない"
  C: "銀行に預けるお金で、預金保険で元本が保護される"
  D: "会社が発行する借金の証書で、満期に元本が返済される"
correct: B
explanation: |
  株式 = **会社が資金調達のために発行する「所有権の一部」**。1 株を買うと、その会社の極小の一部分を所有することになり、以下を得る:

  1. **配当 (dividend)**: 会社の利益の一部を受け取る権利（会社の裁量で支払有無が決まる）
  2. **議決権 (voting rights)**: 株主総会で経営判断に投票する権利
  3. **値上がり益 (capital gain)**: 株価が上がれば売却益

  一方、**元本保証なし**。会社が倒産すれば価値ゼロの可能性。債券 (bond) との最大の違いはここで、株は「リスクを取って会社の成長に賭ける」性質、債券は「貸して利息を受け取る」性質。

  この区別が Stage 1 の基礎。ETF（取引所で売買される株式バスケット）も、結局は株の集まりなので、株の特性が基本になる。
